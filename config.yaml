embeddings:
  config:
    device: cpu
    model_name: sentence-transformers/all-MiniLM-L6-v2
  provider: local
evaluation: null
generation:
  include_sources: true
  max_context_chunks: 5
  prompt_template: 'Context: {context}

    Question: {query}'
  system_prompt: You are a helpful assistant.
guardrails:
  enabled: true
  input: null
  output: null
ingestion:
  batch_size: 10
  chunker:
    config:
      target_chunk_size: 600
    provider: semantic
  multimodal_summarizer:
    api_key: null
    base_url: null
    model_name: gpt-4o
    provider: primary
    temperature: 0
  parser:
    config: {}
    provider: unstructured
llm:
  config:
    base_url: http://localhost:11434/v1
    model: gemma4:31b-cloud
    temperature: 0.1
  provider: local
observability:
  logging:
    file_path: null
    format: json
    level: INFO
    output: stdout
  metrics:
    enabled: true
    port: 9090
    provider: prometheus
  tracing:
    api_key: null
    enabled: true
    endpoint: http://localhost:4317
    provider: opentelemetry
    sample_rate: 1
    service_name: rag-pipeline
project:
  environment: development
  name: local-rag-pipeline
  version: 1.0.0
retrieval:
  config: {}
  reranker: null
  similarity_threshold: 0
  strategy: simple
  top_k: 3
vector_store:
  config:
    collection_name: documents
    prefer_grpc: false
    url: data/qdrant_db
    vector_size: 384
  provider: qdrant
