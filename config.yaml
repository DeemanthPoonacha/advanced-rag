embeddings:
  config:
    device: cuda
    model_name: sentence-transformers/all-MiniLM-L6-v2
  provider: local
evaluation: null
generation:
  include_sources: true
  max_context_chunks: 3
  prompt_template: 'Context:

    {context}


    Question: {query}


    Answer:'
  system_prompt: You are a helpful assistant. Keep your responses concise and accurate.
guardrails:
  enabled: false
  input: null
  output: null
ingestion:
  batch_size: 10
  chunker:
    config:
      target_chunk_size: 500
    provider: by_title
  multimodal_summarizer:
    api_key: null
    base_url: null
    model_name: gpt-4o
    provider: primary
    temperature: 0
  parser:
    config: {}
    provider: unstructured
llm:
  config:
    base_url: http://localhost:11434/v1
    model: gemma3:12b-cloud
    temperature: 0.1
  provider: local
observability:
  logging:
    file_path: null
    format: json
    level: INFO
    output: stdout
  metrics:
    enabled: false
    port: 9090
    provider: prometheus
  tracing:
    api_key: null
    enabled: false
    endpoint: http://localhost:4317
    provider: opentelemetry
    sample_rate: 1
    service_name: rag-pipeline
project:
  environment: development
  name: local-sandbox-pipeline
  version: 1.0.0
retrieval:
  config: {}
  reranker: null
  similarity_threshold: 0
  strategy: simple
  top_k: 3
vector_store:
  config:
    collection_name: documents
    on_disk: false
    url: data/qdrant_db
    vector_size: 384
  provider: qdrant
