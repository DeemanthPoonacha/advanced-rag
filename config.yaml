embeddings:
  config: {}
  provider: openai
generation:
  include_sources: true
  max_context_chunks: 5
  prompt_template: 'Context:

    {context}


    Question: {query}'
  system_prompt: You are a helpful assistant.
ingestion:
  batch_size: 10
  chunker:
    config:
      target_chunk_size: 600
    provider: semantic
  parser:
    config: {}
    provider: unstructured
llm:
  config: {}
  provider: openai
project:
  environment: development
  name: verified-sandbox-pipeline
  version: 1.0.0
retrieval:
  config: {}
  reranker: null
  similarity_threshold: 0.0
  strategy: simple
  top_k: 3
vector_store:
  config: {}
  provider: qdrant
