project:
  name: "local-sandbox-pipeline"
  environment: "development"
  version: "1.0.0"

ingestion:
  parser:
    provider: "unstructured"
    config: {}
  chunker:
    provider: "semantic"
    config:
      target_chunk_size: 500
  batch_size: 10

embeddings:
  provider: "local"
  config:
    model_name: "sentence-transformers/all-MiniLM-L6-v2"
    device: "cpu"

llm:
  provider: "local"
  config:
    base_url: "http://localhost:11434/v1"
    model: "gemma2"
    temperature: 0.1

vector_store:
  provider: "qdrant"
  config:
    url: "data/qdrant_db"
    collection_name: "documents"
    vector_size: 384

retrieval:
  strategy: "simple"
  top_k: 3
  similarity_threshold: 0.0

generation:
  system_prompt: "You are a helpful assistant. Keep your responses concise and accurate."
  prompt_template: "Context:\n{context}\n\nQuestion: {query}\n\nAnswer:"
  max_context_chunks: 3
  include_sources: true

guardrails:
  enabled: false

observability:
  logging:
    level: "INFO"
    format: "json"
  metrics:
    enabled: false
  tracing:
    enabled: false
