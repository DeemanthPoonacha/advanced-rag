project:
  name: "enterprise-accuracy-pipeline"
  environment: "production"
  version: "1.0.0"

ingestion:
  batch_size: 50
  chunker:
    config:
      target_chunk_size: 800
      buffer_size: 1
    provider: "semantic"
  docling:
    export_format: markdown
  enable_multimodal_enrichment: false
  gcp_documentai:
    location: us
    processor_id: null
    project_id: null
  markdown_header:
    chunk_overlap: 200
    max_chunk_size: 1024
    prepend_headers: true
  multimodal_enricher:
    api_key: "${OPENAI_API_KEY}"
    base_url: null
    image_prompt: "Describe this image in detail."
    model_name: "gpt-4o"
    provider: "primary"
    table_prompt: "Analyze this HTML table."
    temperature: 0
  parser:
    config:
      strategy: "hi_res"
      languages: ["en"]
    provider: "unstructured"
  pymupdf:
    extract_images: false
  unstructured_api:
    api_key: null
    api_url: "https://api.unstructured.io/general/v0/general"
    strategy: "hi_res"

embeddings:
  config:
    model_name: "text-embedding-3-small"
    api_key: "${OPENAI_API_KEY}"
  provider: "openai"

llm:
  config:
    model: "gpt-4o"
    temperature: 0.2
    api_key: "${OPENAI_API_KEY}"
  provider: "openai"

vector_store:
  config:
    collection_name: "enterprise_kb"
    url: "http://localhost:6333"
    vector_size: 1536
  provider: "qdrant"

retrieval:
  config:
    merge_threshold: 0.5
  reranker:
    config:
      model: "rerank-english-v3.0"
      api_key: "${COHERE_API_KEY}"
    provider: "cohere"
  similarity_threshold: 0.5
  strategy: "auto_merging"
  top_k: 10

generation:
  include_sources: true
  max_context_chunks: 5
  prompt_template: "Enterprise Context:\n{context}\n\n---\n\nResearch Question: {query}\n\nDetailed Synthesis:"
  system_prompt: "You are an expert enterprise research assistant. Answer the question using only the provided context. Structure your answer using professional markdown."

guardrails:
  enabled: true
  input:
    config:
      model: "meta-llama/Llama-Guard-3-8B"
    provider: "llama_guard"
  output:
    config:
      model: "meta-llama/Llama-Guard-3-8B"
    provider: "llama_guard"

observability:
  logging:
    file_path: null
    format: "json"
    level: "INFO"
    output: "stdout"
  metrics:
    enabled: true
    port: 9090
    provider: "prometheus"
  tracing:
    api_key: null
    enabled: true
    endpoint: "http://localhost:4317"
    provider: "opentelemetry"
    sample_rate: 1
    service_name: "enterprise-rag"

evaluation:
  enabled: true
  config:
    metrics: ["faithfulness", "answer_relevance"]
  provider: "ragas"
