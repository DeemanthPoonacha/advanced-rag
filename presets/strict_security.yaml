project:
  name: "strict-security-pipeline"
  environment: "staging"
  version: "1.0.0"

ingestion:
  batch_size: 10
  chunker:
    config:
      target_chunk_size: 400
    provider: "semantic"
  docling:
    export_format: markdown
  enable_multimodal_enrichment: false
  gcp_documentai:
    location: us
    processor_id: null
    project_id: null
  markdown_header:
    chunk_overlap: 200
    max_chunk_size: 1024
    prepend_headers: true
  multimodal_enricher:
    api_key: "${OPENAI_API_KEY}"
    base_url: null
    image_prompt: "Describe this image in detail."
    model_name: "gpt-4o"
    provider: "primary"
    table_prompt: "Analyze this HTML table."
    temperature: 0
  parser:
    config: {}
    provider: "unstructured"
  pymupdf:
    extract_images: false
  unstructured_api:
    api_key: null
    api_url: "https://api.unstructured.io/general/v0/general"
    strategy: "hi_res"

embeddings:
  config:
    model_name: "text-embedding-3-small"
    api_key: "${OPENAI_API_KEY}"
  provider: "openai"

llm:
  config:
    model: "gpt-4o-mini"
    temperature: 0.0
    api_key: "${OPENAI_API_KEY}"
  provider: "openai"

vector_store:
  config:
    collection_name: "secure_kb"
    url: "http://localhost:6333"
    vector_size: 1536
  provider: "qdrant"

retrieval:
  config: {}
  reranker: null
  similarity_threshold: 0.6
  strategy: "simple"
  top_k: 4

generation:
  include_sources: true
  max_context_chunks: 3
  prompt_template: "Secure Context:\n{context}\n\nUser Inquiry: {query}\n\nSafe Response:"
  system_prompt: "You are a secure, helpful assistant. Do NOT disclose confidential information. Answer the question using ONLY the provided facts. If the information is not present, decline to answer."

guardrails:
  enabled: true
  input:
    config:
      model: "meta-llama/Llama-Guard-3-8B"
    provider: "llama_guard"
  output:
    config:
      model: "meta-llama/Llama-Guard-3-8B"
    provider: "llama_guard"

observability:
  logging:
    file_path: null
    format: "json"
    level: "WARNING"
    output: "stdout"
  metrics:
    enabled: false
    port: 9090
    provider: "prometheus"
  tracing:
    api_key: null
    enabled: false
    endpoint: "http://localhost:4317"
    provider: "opentelemetry"
    sample_rate: 1
    service_name: "rag-pipeline"

evaluation: null
