project:
  name: "multimodal-layout-pipeline"
  environment: "development"
  version: "1.0.0"

ingestion:
  parser:
    provider: "unstructured"
    config:
      strategy: "hi_res"
      extract_images: true
      extract_tables: true
  chunker:
    provider: "semantic"
    config:
      target_chunk_size: 1000
  multimodal_summarizer:
    provider: "primary"
    model_name: "gpt-4o"
    temperature: 0.0
    api_key: "${OPENAI_API_KEY}"
  batch_size: 20

embeddings:
  provider: "openai"
  config:
    model: "text-embedding-3-small"
    api_key: "${OPENAI_API_KEY}"

llm:
  provider: "openai"
  config:
    model: "gpt-4o"
    temperature: 0.1
    api_key: "${OPENAI_API_KEY}"

vector_store:
  provider: "qdrant"
  config:
    url: "http://localhost:6333"
    collection_name: "multimodal_kb"
    vector_size: 1536

retrieval:
  strategy: "simple"
  top_k: 6
  similarity_threshold: 0.4

generation:
  system_prompt: "You are an assistant trained to interpret structured pages containing tables, charts, and descriptions. Answer the question using the layout information provided in the context."
  prompt_template: "Layout & Text Context:\n{context}\n\nQuestion: {query}\n\nAnswer:"
  max_context_chunks: 4
  include_sources: true

guardrails:
  enabled: false

observability:
  logging:
    level: "INFO"
    format: "json"
  metrics:
    enabled: true
  tracing:
    enabled: false
